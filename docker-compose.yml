version: "3.9"

services:
  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./dataset:/app/dataset        # real + synthetic Excel files
      - ./db:/app/db                  # DuckDB persistent file
      - ./genai/chroma_store:/app/genai/chroma_store  # ChromaDB vector store
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=llama3
      - DUCKDB_PATH=db/intern_platform.duckdb
      - CHROMA_PERSIST_DIR=genai/chroma_store
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: >
      /bin/sh -c "ollama serve &
      sleep 10 &&
      ollama pull llama3 &&
      wait"
    restart: unless-stopped

volumes:
  ollama_data:
